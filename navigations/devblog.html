<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="stylesheet" href="../style.css"/>
  <link rel="icon" href="../Images/LOGO2.png">
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet"> 
  <title>Frankrev Dev | BLOG</title>
</head>

<body>

  <header>
    <div class="container">
      <div id="logo">
        <img src="../Images/LOGO2.png" alt="Cool Logo!" height="100px">
      </div>
      <nav id="site-nav" aria-label="Main navigation">
        <!-- content injected by script -->
      </nav>
    </div>
  </header>

  <section class="content">
    <div class="container">
      <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Ffrankrev.dev%2Fposts%2Fpfbid0jrUaYxtC6zsv6vT5yPAwatYLoiYz1MuqXyK1jKkZTd9EDy99jpQHiUiyzRaAW57cl&show_text=true&width=500" width="500" height="472" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
    </div>
  </section>

  <script>
    // fetch shared nav partial and inject
    fetch('/navigations/nav.html')
      .then(r => r.text())
      .then(html => document.getElementById('site-nav').innerHTML = html)
      .catch(err => console.error('Nav load failed:', err));
  </script>

</body>
</html>
