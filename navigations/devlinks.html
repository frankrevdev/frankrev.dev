<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="stylesheet" href="../style.css"/>
  <link rel="icon" href="../Images/LOGO2.png">
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet"> 
  <title>Frankrev Dev | LINKS</title>
</head>

<body>

  <header>
    <div class="container">
      <div id="logo">
        <img src="../Images/LOGO2.png" alt="Cool Logo!" height="100px">
      </div>
      <nav id="site-nav" aria-label="Main navigation">
        <!-- injected -->
      </nav>
    </div>
  </header>

  <section class="content">
    <div class="container">
      <h1>frankrevdev.vercel.app</h1>
        <div class="links">
            <!-- use an <a> wrapping an <img> to make the icon clickable -->
            <!-- replace the src paths with your actual icon files -->
            <a href="https://github.com/frankrevdev" target="_blank" rel="noopener">
                <img src="../Images/socials-links/github.png" alt="GitHub">
            </a>
            <a href="https://frankrevdev.itch.io" target="_blank" rel="noopener">
                <img src="../Images/socials-links/itchio.png" alt="Itch.io">
            </a>
            <a href="https://youtube.com/@frankrevdev" target="_blank" rel="noopener">
                <img src="../Images/socials-links/yt.png" alt="YouTube">
            </a>
            <a href="https://facebook.com/frankrev.dev" target="_blank" rel="noopener">
                <img src="../Images/socials-links/fb.png" alt="Facebook">
            </a>
            <a href="https://instagram.com/frankrev.dev" target="_blank" rel="noopener">
                <img src="../Images/socials-links/insta.png" alt="Instagram">
            </a>
            <a href="https://threads.com/frankrev.dev" target="_blank" rel="noopener">
                <img src="../Images/socials-links/threads.png" alt="Threads">
            </a>
            <a href="https://x.com/frankrevdev" target="_blank" rel="noopener">
                <img src="../Images/socials-links/x.png" alt="X">
            </a>
        </div>
    </div>
  </section>

  <script>
    // fetch shared nav partial and inject
    fetch('/navigations/nav.html')
      .then(r => r.text())
      .then(html => document.getElementById('site-nav').innerHTML = html)
      .catch(e => console.error('Nav load failed:', e));
  </script>

</body>
</html>
