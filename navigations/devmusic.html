<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="../style.css"/>

<body>

  <header>
    <div class="container">
      <div id="logo">
        <img src="../Images/LOGO2.png" alt="Cool Logo!" height="100px">
      </div>
      <nav id="site-nav" aria-label="Main navigation">
        <!-- content injected by script -->
      </nav>
    </div>
  </header>

  <section class="content">
    <div class="container">
        <h1>Franco Padua</h1>
            <div class="container1">
                =================================== THIS SECTION IS UNDER CONSTRUCTION ===================================== 
            </div>
      <hr>
      <h1>Other Identities</h1>
      <div class="container2">
        <!-- Spotify provides an "Embed" player for artists, albums, playlists, etc. -->
        <!-- the snippet below displays the artist’s profile photo and basic info -->
        <iframe src="https://open.spotify.com/embed/artist/3hD6jHhI80jHqBKcDHPqN4"
                width="300" height="380" frameborder="0"
                allowtransparency="true" allow="encrypted-media">
        </iframe>

        <iframe src="https://open.spotify.com/embed/artist/74MbgZuZe4oshpldo6aRRL"
                width="300" height="380" frameborder="0"
                allowtransparency="true" allow="encrypted-media">
        </iframe>
        <!--
          Replace the URL with the one generated by Spotify’s “Share → Embed Artist”
          option, or change the ID (the long string after /artist/) to your own artist’s ID.
          You can also fetch the artist details from Spotify’s Web API and render
          a custom card instead of using the iframe if you need more control.
        -->
      </div>
    </div>
  </section>

  <script>
    // fetch shared nav partial and inject
    fetch('/navigations/nav.html')
      .then(r => r.text())
      .then(html => document.getElementById('site-nav').innerHTML = html)
      .catch(err => console.error('Nav load failed:', err));
  </script>

</body>
